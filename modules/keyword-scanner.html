 <div class="flex flex-col h-full overflow-hidden p-3 gap-3">
    <div class="bg-black/40 border border-[#00ff41] p-3 relative flex-shrink-0">
        <div class="text-[10px] text-green-300 mb-2 leading-relaxed">
            <strong class="text-white uppercase tracking-widest">Keyword Radar:</strong> Analysiere das Suchvolumen und die Kaufintention eines konkreten Suchbegriffs.
        </div>
        <input type="text" id="kw-input" class="w-full bg-black/60 border border-green-900/50 text-[#00ff41] p-3 focus:outline-none focus:border-[#00ff41] font-mono text-sm mb-2" placeholder="> Suchbegriff eingeben..." />
        <button onclick="startKeywordScan()" class="hud-btn w-full py-3 text-sm font-bold tracking-widest hover:bg-[#00ff41] hover:text-black border-[#00ff41] text-[#00ff41]">
            SUCHDATEN ABRUFEN
        </button>
    </div>

    <div class="flex-grow bg-black/40 border border-green-800 flex flex-col overflow-hidden relative">
        <div class="bg-green-900/30 p-2 border-b border-green-800 text-[9px] tracking-wider text-green-400 flex justify-between flex-shrink-0">
            <span>[ SEARCH_METRICS_DB ]</span>
            <span>DATA: ESTIMATED</span>
        </div>
        <div id="kw-results" class="flex-grow overflow-y-auto custom-scrollbar p-3 flex flex-col gap-3 font-mono text-sm text-green-500 pb-20">
            <div class="text-xs text-green-800 text-center mt-6 opacity-50 uppercase">
                Awaiting Keyword Input...
            </div>
        </div>
    </div>
</div>
