<div class="flex flex-col h-full overflow-hidden p-3 gap-3">

        <div class="text-[10px] text-green-300 mb-4 leading-relaxed border-b border-green-900/50 pb-2">

        <button onclick="saveSettings()" class="hud-btn w-full py-3 text-sm font-bold tracking-widest hover:bg-green-500 hover:text-black mb-4">

        </div>
