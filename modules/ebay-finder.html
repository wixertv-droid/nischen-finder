<div class="flex flex-col h-full overflow-hidden p-3 gap-3">
    <div class="bg-black/40 border border-green-800 p-3 relative flex-shrink-0">
        <div class="text-[10px] text-green-300 mb-2 leading-relaxed">
            <strong class="text-white">ZIEL:</strong> Gib deine Produkt-Ideen ein (1 pro Zeile). Das System prüft die eBay-Datenbank auf <b>die Anzahl der aktiven Konkurrenten</b> in Deutschland.
        </div>
        <textarea id="nischen-input" class="w-full bg-black/60 border border-green-900/50 text-green-400 p-3 focus:outline-none focus:border-green-400 font-mono text-sm mb-2 h-24 resize-none custom-scrollbar" placeholder="> Ananas Kapseln&#10;> Hundebett XXL"></textarea>
        <div class="flex gap-2">
            <button onclick="startNischenScan()" class="hud-btn w-3/4 py-3 text-sm font-bold tracking-widest hover:bg-green-500 hover:text-black">
                SCAN STARTEN
            </button>
            <button onclick="document.getElementById('nischen-input').value=''" class="hud-btn w-1/4 py-3 text-xs font-bold text-red-500 border-red-900 hover:bg-red-900 hover:text-white">
                DEL
            </button>
        </div>
    </div>

    <div class="flex-grow bg-black/40 border border-green-800 flex flex-col overflow-hidden relative">
        <div class="bg-green-900/30 p-2 border-b border-green-800 text-[9px] tracking-wider text-green-400 flex justify-between flex-shrink-0">
            <span>[ LIVE DATEN-STREAM ]</span>
            <span>QUELLE: EBAY.DE</span>
        </div>
        <div id="nischen-results" class="flex-grow overflow-y-auto custom-scrollbar p-3 flex flex-col gap-2 font-mono text-sm text-green-500 pb-20">
            <div class="text-xs text-green-800 text-center mt-6 opacity-50 uppercase tracking-widest">
                System ready.<br>Warte auf Input...
            </div>
        </div>
    </div>
</div>
