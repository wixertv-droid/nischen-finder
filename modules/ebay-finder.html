<div class="flex flex-col gap-4 h-full">
    <p class="text-xs text-green-500 opacity-70 border-b border-green-900 pb-2">INPUT TARGET KEYWORDS. ONE PER LINE.</p>
    
    <textarea id="keyword-input" class="bg-black/50 border border-green-800 text-green-400 p-3 h-32 focus:outline-none focus:border-green-500 font-mono text-sm resize-none custom-scrollbar" placeholder="> keyword_1&#10;> keyword_2&#10;> keyword_3..."></textarea>
    
    <button onclick="startEbayScan()" class="hud-btn py-3 font-bold tracking-widest uppercase hover:bg-green-500 hover:text-black transition-colors">Initiate Scan</button>
    
    <div class="text-xs text-green-500 mt-2 border-b border-green-900 pb-1 flex justify-between">
        <span>SCAN RESULTS:</span>
        <span class="opacity-50">FILTER: < 30 MATCHES</span>
    </div>
    
    <div id="scan-results" class="flex-grow overflow-y-auto custom-scrollbar flex flex-col gap-2 p-2 bg-black/30 border border-green-900/50">
        <div class="text-xs opacity-50 text-center mt-4">Awaiting parameters...</div>
    </div>
</div>
