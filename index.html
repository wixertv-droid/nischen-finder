<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nischen-Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-xl font-bold mb-4">eBay Lücken-Finder 🔍</h1>
        
        <textarea id="keywords" class="w-full p-2 border rounded mb-4" placeholder="Keywords (eines pro Zeile)"></textarea>
        
        <button onclick="startAnalysis()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">Analyse starten</button>

        <div id="results" class="mt-6 space-y-2">
            </div>
    </div>

    <script>
        async function startAnalysis() {
            const input = document.getElementById('keywords').value;
            const keywords = input.split('\n').filter(k => k.trim() !== "");
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<p>Suche läuft...</p>";

            for (let kw of keywords) {
                // HINWEIS: Hier kommt später dein eBay API-Aufruf rein
                // Für den allerersten Test simulieren wir die Logik:
                const mockTreffer = Math.floor(Math.random() * 200); // Test-Zahl
                
                let color = mockTreffer < 50 ? "bg-green-100 border-green-500" : "bg-red-100 border-red-500";
                
                resultsDiv.innerHTML += `
                    <div class="border-l-4 p-3 ${color} rounded shadow-sm">
                        <span class="font-bold">${kw}</span>: ${mockTreffer} Treffer
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
