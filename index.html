<!DOCTYPE html>
<html lang="de">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030a03">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DWW // HUD-INTERFACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-green-dim: rgba(0, 255, 65, 0.2);
            --neon-red: #ff0033;
            --hud-bg: rgba(0, 20, 0, 0.85);
        }
        /* Body festsetzen, damit nichts wackelt */
        body {
            background-color: #030a03;
            background-image: 
                radial-gradient(circle at 50% 50%, var(--neon-green-dim) 0%, transparent 60%),
                linear-gradient(rgba(0, 59, 0, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 59, 0, 0.15) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Verhindert das Scrollen der ganzen Seite */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }

        .hud-panel {
            background: var(--hud-bg);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green-dim), inset 0 0 15px var(--neon-green-dim);
            backdrop-filter: blur(5px);
        }

        .hud-btn {
            background: rgba(0, 40, 0, 0.4);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            transition: transform 0.1s;
        }
        .hud-btn:active {
            transform: scale(0.95);
            background: var(--neon-green);
            color: #000;
        }

        /* Footer Menü Buttons */
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 10px 0;
            color: var(--neon-green);
            opacity: 0.5;
            transition: all 0.2s;
        }
        .nav-btn.active {
            opacity: 1;
            background: rgba(0, 255, 65, 0.1);
            border-top: 2px solid var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
        }
        .nav-btn svg { width: 24px; height: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="login-section" class="hud-panel p-6 w-11/12 max-w-sm z-10">
        <h1 class="text-3xl font-black tracking-widest text-center mb-6" style="text-shadow: 0 0 10px var(--neon-green);">MARKET_CORE</h1>
        <div id="code-display" class="mb-6 h-12 border border-green-800 bg-black/50 text-3xl tracking-[0.4em] font-bold flex items-center justify-center">
            _ _ _ _
        </div>
        <div class="grid grid-cols-3 gap-2">
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('1')">1</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('2')">2</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('3')">3</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('4')">4</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('5')">5</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('6')">6</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('7')">7</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('8')">8</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('9')">9</button>
            <button class="hud-btn h-14 text-sm font-bold text-red-500 border-red-900" onclick="clearCode()">DEL</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('0')">0</button>
            <button class="hud-btn h-14 text-sm font-bold bg-green-900/40" onclick="checkCode()">AUTH</button>
        </div>
    </div>

    <div id="app-content" class="hidden z-10 w-full h-full max-w-md hud-panel flex flex-col relative">
        
        <header class="border-b border-green-800 p-3 bg-black/60">
            <h2 id="module-title" class="text-xl font-bold tracking-widest italic">MODULE_NAME</h2>
            <p id="module-desc" class="text-[10px] opacity-70 mt-1 leading-tight">Description loading...</p>
        </header>

        <div id="tool-container" class="flex-grow overflow-hidden flex flex-col pb-[70px]">
            </div>

        <nav class="absolute bottom-0 left-0 w-full h-[70px] border-t border-green-800 bg-black/90 flex justify-between z-20">
            <button onclick="switchModule('ebay-finder', this)" class="nav-btn active">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span class="text-[9px] tracking-wider">NISCHEN</span>
            </button>
            <button onclick="switchModule('sold-gap', this)" class="nav-btn">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
                <span class="text-[9px] tracking-wider">TRENDS</span>
            </button>
            <button onclick="switchModule('settings', this)" class="nav-btn">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
                <span class="text-[9px] tracking-wider">SYSTEM</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker registriert:', registration.scope);
                }).catch(error => {
                    console.log('ServiceWorker Fehlgeschlagen:', error);
                });
            });
        }
    </script>
</body>
</html>
