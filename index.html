<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DWW // HUD-INTERFACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-green-dim: rgba(0, 255, 65, 0.2);
            --neon-red: #ff0033;
            --hud-bg: rgba(0, 20, 0, 0.6);
        }
        body {
            background-color: #030a03;
            background-image: 
                radial-gradient(circle at 50% 50%, var(--neon-green-dim) 0%, transparent 60%),
                linear-gradient(rgba(0, 59, 0, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 59, 0, 0.15) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Jarvis HUD Elemente */
        .hud-panel {
            background: var(--hud-bg);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green-dim), inset 0 0 20px var(--neon-green-dim);
            /* Abgeschrägte Ecken im Sci-Fi Stil */
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            backdrop-filter: blur(5px);
        }

        /* Klick-Physik & Tasten-Design */
        .hud-btn {
            background: rgba(0, 40, 0, 0.4);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .hud-btn:active {
            transform: scale(0.92); /* Echte Klick-Physik */
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* Fehler-Animation (Rot blinken und wackeln) */
        .error-state {
            border-color: var(--neon-red) !important;
            box-shadow: 0 0 30px rgba(255, 0, 51, 0.5), inset 0 0 20px rgba(255, 0, 51, 0.3) !important;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            color: var(--neon-red) !important;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* Ladebalken */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(0, 59, 0, 0.5);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <div class="absolute w-[600px] h-[600px] border border-green-900 rounded-full opacity-20 animate-[spin_60s_linear_infinite] pointer-events-none"></div>
    <div class="absolute w-[400px] h-[400px] border-t-2 border-l-2 border-green-500 rounded-full opacity-30 animate-[spin_30s_linear_infinite_reverse] pointer-events-none"></div>

    <header class="mb-10 text-center z-10">
        <h1 class="text-4xl font-black tracking-[0.2em] italic" style="text-shadow: 0 0 15px var(--neon-green);">MARKET_CORE</h1>
        <div class="text-xs tracking-widest opacity-70 mt-2">AWAITING AUTHORIZATION</div>
    </header>

    <div id="login-section" class="hud-panel p-8 w-80 z-10 relative transition-all duration-300">
        
        <div id="display-container" class="mb-6 p-3 border border-green-800 bg-black/50 text-center relative overflow-hidden">
            <div id="code-display" class="text-3xl tracking-[0.4em] font-bold h-10 flex items-center justify-center">
                _ _ _ _
            </div>
            <div class="absolute top-0 left-0 w-full h-1 bg-green-500/30 animate-[scan_2s_linear_infinite]"></div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('1')">1</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('2')">2</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('3')">3</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('4')">4</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('5')">5</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('6')">6</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('7')">7</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('8')">8</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('9')">9</button>
            <button class="hud-btn h-14 text-sm font-bold text-red-500 border-red-900" onclick="clearCode()">DEL</button>
            <button class="hud-btn h-14 text-xl font-bold" onclick="addDigit('0')">0</button>
            <button class="hud-btn h-14 text-sm font-bold bg-green-900/40" onclick="checkCode()">AUTH</button>
        </div>
    </div>

    <div id="loading-section" class="hidden hud-panel p-8 w-80 z-10 text-center">
        <h2 class="text-xl font-bold tracking-widest mb-4 animate-pulse">DECRYPTING...</h2>
        <div class="text-4xl font-black mb-2" id="loading-percent">0%</div>
        <div class="text-xs opacity-60" id="loading-text">Establishing secure connection...</div>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <div id="app-content" class="hidden z-10 w-full max-w-3xl h-[85vh] hud-panel p-6 flex flex-col">
        <div class="flex justify-between items-end border-b border-green-800 pb-2 mb-4">
            <div class="text-xl font-bold tracking-widest italic">NEXUS // EBAY-SCANNER</div>
            <div class="text-xs opacity-50 flex gap-4">
                <span class="cursor-pointer hover:text-white transition-colors">[ EBAY ]</span>
                <span class="opacity-30">[ AMZ ]</span>
            </div>
        </div>
        <div id="tool-container" class="flex-grow overflow-y-auto">
            </div>
    </div>

    <style>
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
    </style>

    <script src="app.js"></script>
</body>
</html>
